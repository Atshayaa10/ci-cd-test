image: python:3.9

stages:
  - test
  - deploy

test:
  stage: test
  script:
    - pip install -r requirements.txt
    - python -m unittest discover -s tests -p 'test_*.py'
  artifacts:
    paths:
      - test-results.xml

deploy:
  stage: deploy
  script:
    - pip install -r requirements.txt
    - python calculator.py
  only:
    - main